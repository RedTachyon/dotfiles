# Mouse on for click-to-focus panes/windows
set -g mouse on

# Use system clipboard when tmux copies (uses OSC 52)
set -g set-clipboard on

# Mac clipboard integration
if-shell 'command -v pbcopy >/dev/null' 'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"'
if-shell 'command -v pbcopy >/dev/null' 'bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"'
if-shell 'command -v pbcopy >/dev/null' 'bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "pbcopy"'

# Quick toggle if you need terminal-native selection temporarily
bind m run-shell 'if [ "$(tmux show -gv mouse)" = "on" ]; then tmux set -g mouse off \\; display-message "Mouse OFF (terminal selection)"; else tmux set -g mouse on \\; display-message "Mouse ON (click panes)"; fi'

# Use vim keys in copy mode for easier scrolling and navigation
setw -g mode-keys vi

# Increase scrollback history limit
set -g history-limit 5000

# Vim-style pane navigation (no prefix required)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes using Alt + Arrow keys (adjusts by 5 columns/rows)
bind -n M-Left  resize-pane -L 5
bind -n M-Right resize-pane -R 5
bind -n M-Up    resize-pane -U 5
bind -n M-Down  resize-pane -D 5

# Quick reload of the config (Prefix + r)
bind r source-file ~/.tmux.conf \; display-message "Tmux config reloaded!"

# --- Additional Settings ---

# Inherit the current pane's working directory when creating new windows or panes
bind c new-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"

# Shortcut keys for splitting windows (alternative bindings)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Status bar customization: display hostname, session name, and current time
set -g status-bg black
set -g status-fg white
set -g status-left-length 60
set -g status-right-length 90
set -g status-interval 5
set -g status-left "#[fg=green]#H #[fg=yellow]#S"
set -g status-right "#[fg=cyan]%Y-%m-%d %H:%M:%S"

# Distinct pane border colors for active/inactive panes
set -g pane-border-style fg=brightblack
set -g pane-active-border-style fg=green

# Use a visual bell instead of an audible beep
set -g visual-bell on

# Disable automatic renaming of windows for consistent naming
set -g allow-rename off

# Copy mode integration with system clipboard on Linux when xclip is available.
if-shell 'command -v xclip >/dev/null' 'bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -sel clip -i"'


# Use fish if available from one of these locations (in order):
#   1. Homebrew on Apple Silicon
#   2. $HOME/scripts/fish
#   3. /usr/bin/fish
#   4. fish found in PATH

run-shell 'tmux set -g default-shell "$(if [ -x /opt/homebrew/bin/fish ]; then echo /opt/homebrew/bin/fish; elif [ -x "$HOME/scripts/fish" ]; then echo "$HOME/scripts/fish"; elif [ -x /usr/bin/fish ]; then echo /usr/bin/fish; elif command -v fish >/dev/null; then command -v fish; else echo /bin/bash; fi)"'
run-shell 'tmux set -g default-command "$(if [ -x /opt/homebrew/bin/fish ]; then echo /opt/homebrew/bin/fish; elif [ -x "$HOME/scripts/fish" ]; then echo "$HOME/scripts/fish"; elif [ -x /usr/bin/fish ]; then echo /usr/bin/fish; elif command -v fish >/dev/null; then command -v fish; else echo /bin/bash; fi)"'
